	// Chemical Reactor
		#KDVA-chemreactor-titl = KD Chemical Reactor (2.5m)
		#KDVA-chemreactor-desc = A high-efficiency chemical processor for refining Metal from Ore or ScrapMetal. Especially well-suited to ScrapMetal recovery, with enough secondary chemistry to reclaim useful byproducts from selected processes.
		#KDVA-deprecated-chemreactor-titl = KD Chemical Reactor (Deprecated)
		#KDVA-deprecated-chemreactor-desc = Deprecated legacy part. Use the KD Chemical Reactor (2.5m) instead.

