@PART[KD-ST????FS]:HAS[#KDVA_passableVolume[*],#KDVA_cargoVolume[*]]:NEEDS[KeridianDynamics,B9PartSwitch&!Firespitter&!InterstellarFuelSwitch]:AFTER[KeridianDynamics]
{
	@category = Payload
	@tags ^= :$: payload cargo container:

	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]
	{
		@baseVolume = #$../KDVA_passableVolume$
	}

	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TopBotSwitch]]
	{
		@switcherDescription = Bottom Type
		%switcherDescriptionPlural = Bottom Types

		@SUBTYPE[Crewed]
		{
			%title = Passable
			@transform = Model_Foil

			MODULE:NEEDS[ConnectedLivingSpace]
			{
				IDENTIFIER
				{
					name = ModuleB9PartSwitch
					moduleID = fuelSwitch
				}
				DATA
				{
					baseVolume = #$../../../../KDVA_passableVolume$
				}
			}

			MODULE:NEEDS[ConnectedLivingSpace]
			{
				IDENTIFIER
				{
					name = ModuleConnectedLivingSpace
				}
				DATA
				{
					passable = True
				}
			}
		}

		@SUBTYPE[Cargo]
		{
			%title = Cargo
			@transform = Model_TopBot

			MODULE
			{
				IDENTIFIER
				{
					name = ModuleB9PartSwitch
					moduleID = fuelSwitch
				}
				DATA
				{
					baseVolume = #$../../../../KDVA_cargoVolume$
				}
			}

			MODULE
			{
				IDENTIFIER
				{
					name = ModuleConnectedLivingSpace
				}
				DATA
				{
					passable = False
				}
			}
		}
	}

	VABORGANIZER:NEEDS[VABOrganizer]
	{
		organizerSubcategory = cargoContainers
	}
}

@PART[KD-ST????FS]:HAS[#KDVA_passableVolume[*],#KDVA_cargoVolume[*]]:NEEDS[KeridianDynamics,B9PartSwitch&!Firespitter&!InterstellarFuelSwitch]:AFTER[KeridianDynamics]
{
	!KDVA_passableVolume = DELETE
	!KDVA_cargoVolume = DELETE
}

@PART[KD-ST????FS]:NEEDS[KeridianDynamics,Firespitter|InterstellarFuelSwitch]:AFTER[KeridianDynamics]
{
	@category = Payload
	@tags ^= :$: payload cargo container:

	VABORGANIZER:NEEDS[VABOrganizer]
	{
		organizerSubcategory = cargoContainers
	}
}

@PART[KD-T????FS]:NEEDS[KeridianDynamics,B9PartSwitch&!Firespitter&!InterstellarFuelSwitch]:AFTER[KeridianDynamics]
{
	@category = -1
	%TechHidden = True
	%entryCost = 0
	@tags ^= :$: hidden duplicate variant:
}
