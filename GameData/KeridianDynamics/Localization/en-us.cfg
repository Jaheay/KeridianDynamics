	// FAVA Fully Automated Vessel Assembly
		#KDVA-FAVA-titl = KD Fully Automated Vessel Assembler
		#KDVA-FAVA-desc = An autonomous vessel-assembly workshop for remote construction yards. Provides construction output without crew.
		
	// 	Furnaces
		#KDVA-furnace-small-titl = KD Small Furnace
		#KDVA-furnace-small-desc = A compact blast furnace for refining Metal from Ore, metal-bearing ore, or ScrapMetal. Faster and more power-efficient than the chemical reactor, but with lower recovery from recycled scrap.

		#KDVA-furnace-titl = KD Industrial Furnace
		#KDVA-furnace-desc = A heavy blast furnace for bulk Metal production from Ore, metal-bearing ore, or ScrapMetal. Designed for mature construction bases that need high refinery throughput.

	// Keronica (Computer Controlled)
		#KDVA-Keronica-titl = KD Keronica 1214 Command Computer
		#KDVA-Keronica-desc = A compact command computer for mining, refining, and off-world construction operations. Includes an integrated launch cradle for releasing completed vessels directly from the unit.

	// Launchpads
		#KDVA-LaunchPad-titl = KD Launch Pad
		#KDVA-LaunchPad-desc = A compact launch platform for off-world construction yards.

		#KDVA-LaunchPad-variants-125 = 1.25m Launch Pad
