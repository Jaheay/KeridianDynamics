// Keridian Dynamics ST/T duplicate tank consolidation.
//
// ST parts remain the editor-facing parts. The original T parts are hidden
// when B9PartSwitch can represent the cargo/non-passable versions on ST parts.
//
// B9 cannot modify another ModuleB9PartSwitch at runtime, so cargo/passable
// capacity is represented on the existing fuelSwitch as resource/bottom subtypes.

@PART[KD-ST1251FS]:NEEDS[KeridianDynamics,B9PartSwitch&!Firespitter&!InterstellarFuelSwitch]:AFTER[KeridianDynamics]
{
	%KDVA_passableVolume = 1077.713
	%KDVA_cargoVolume = 1121.701
}

