// Keridian Dynamics ST/T duplicate tank consolidation.
//
// ST parts remain the editor-facing parts. The existing Top/Bot switch becomes
// the passable/cargo bottom-type switch and drives the existing fuelSwitch
// capacity. Standalone T parts are hidden when B9 can provide the cargo option.

@PART[KD-ST1251FS]:NEEDS[KeridianDynamics,B9PartSwitch&!Firespitter&!InterstellarFuelSwitch]:AFTER[KeridianDynamics]
{
	%KDVA_passableVolume = 1077.713
	%KDVA_cargoVolume = 1121.701
}

