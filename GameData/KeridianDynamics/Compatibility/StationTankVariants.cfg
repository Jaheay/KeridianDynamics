@PART[KD-ST????FS]:HAS[#KDVA_passableVolume[*],#KDVA_blockedVolumeDelta[*]]:NEEDS[KeridianDynamics,B9PartSwitch&!Firespitter&!InterstellarFuelSwitch]:AFTER[KeridianDynamics]
{
	@category = Payload
	@tags ^= :$: payload cargo container:

	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]
	{
		@switcherDescription = Tank Type
		%switcherDescriptionPlural = Tank Types
		@baseVolume = #$../KDVA_passableVolume$
	}

	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = KDVA_passabilitySwitch
		parentID = fuelSwitch
		switcherDescription = FreeIva
		switcherDescriptionPlural = FreeIva
		affectDragCubes = false
		affectFARVoxels = false

		SUBTYPE
		{
			name = Passable
			title = Passable
			defaultSubtypePriority = 10

			MODULE:NEEDS[ConnectedLivingSpace]
			{
				IDENTIFIER
				{
					name = ModuleConnectedLivingSpace
				}
				DATA
				{
					passable = True
				}
			}
		}

		SUBTYPE
		{
			name = Blocked
			title = Blocked
			volumeAddedToParent = #$../../KDVA_blockedVolumeDelta$

			MODULE:NEEDS[ConnectedLivingSpace]
			{
				IDENTIFIER
				{
					name = ModuleConnectedLivingSpace
				}
				DATA
				{
					passable = False
				}
			}
		}
	}

	VABORGANIZER:NEEDS[VABOrganizer]
	{
		%organizerSubcategory = cargoContainers
	}
}

@PART[KD-ST1001FS|KD-ST2002FS|KD-ST3001FS|KD-ST3002FS|KD-ST3252FS]:NEEDS[KeridianDynamics,B9PartSwitch&!Firespitter&!InterstellarFuelSwitch]:AFTER[KeridianDynamics]
{
	!MODULE[ModulePartVariants] {}
	!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TopBotSwitch]] {}
	MODULE
	{
		name = ModulePartVariants
		baseVariant = Crew
		useMultipleDragCubes = false
		VARIANT
		{
			name = Crew
			displayName = Crew
			themeName = White
			primaryColor = #ffffff
			secondaryColor = #b0b0b0
			GAMEOBJECTS
			{
				Model_Foil = true
				Model_TopBot = false
			}
		}
		VARIANT
		{
			name = Cargo
			displayName = Cargo
			themeName = Black
			primaryColor = #1f1f1f
			secondaryColor = #555555
			GAMEOBJECTS
			{
				Model_Foil = false
				Model_TopBot = true
			}
		}
	}
}

