// Remove the legacy cargo-only parts.
!PART[KD-T????FS]:FINAL {}
!INTERNAL[KD-T????-IVA]:FINAL {}

// B9 consolidation rolls cargo capacity and models into the ST series.
// Keep only the passable crew configuration when cargo tanks are disabled.
@PART[KD-ST????FS]:NEEDS[B9PartSwitch&!Firespitter&!InterstellarFuelSwitch]:FINAL
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[KDVA_passabilitySwitch]]
	{
		!SUBTYPE[Blocked] {}
	}

	@MODULE[ModulePartVariants]
	{
		!VARIANT[Cargo] {}
	}
}
