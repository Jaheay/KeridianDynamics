// MetalOre is not used by the SimpleConstruction resource chain. This is commented out to avoid side effects.
// !MODULE[ModuleResourceConverter],*:HAS[@INPUT_RESOURCE:HAS[#ResourceName[MetalOre]]] {}

// Ore -> Metal + LF/Ox
//
// KD combines Metal refining and fuel production in one converter. The
// Ore input is partitioned between Metal and LF/Ox rather than applying
// two independent conversions.
//
// KDs Original SimpleConstruction balance targeted 39 mass-% Metal. The existing
// 0.026 Metal/s rate was calculated using EPL Metal at 0.039 t/unit.
// SimpleConstruction uses Metal at 0.0078 t/unit, so the correct rate is
// five times higher:
//
//     0.026 * (0.039 / 0.0078) = 0.13 Metal/s
//
// At the reactors 0.26 Ore/s input:
//
//     Ore   = 0.0100 t/unit
//     Metal = 0.0078 t/unit
//     LF/Ox = 0.0050 t/unit
//
// Input and output:
//
//     Ore input             = 0.26  * 0.0100 = 0.002600 t/s
//     Metal output          = 0.13  * 0.0078 = 0.001014 t/s
//     Metal mass yield      = 0.001014 / 0.002600 = 39%
//     Available LF/Ox mass  = 0.002600 - 0.001014 = 0.001586 t/s
//     Combined LF/Ox        = 0.001586 / 0.0050 = 0.3172 units/s
//
// LF/Ox uses the stock 45:55 split:
//
//     LiquidFuel = 0.3172 * 0.45 = 0.14274
//     Oxidizer   = 0.3172 * 0.55 = 0.17446
//
@PART[KD-ChemicalReactor-250]:NEEDS[SimpleConstruction]:FOR[KeridianDynamics]
{
	@MODULE[ModuleResourceConverter]:HAS[@INPUT_RESOURCE:HAS[#ResourceName[Ore]],@OUTPUT_RESOURCE:HAS[#ResourceName[Metal]],@OUTPUT_RESOURCE:HAS[#ResourceName[LiquidFuel]],@OUTPUT_RESOURCE:HAS[#ResourceName[Oxidizer]]]
	{
		@OUTPUT_RESOURCE:HAS[#ResourceName[Metal]]
		{
			@Ratio = 0.13
		}

		@OUTPUT_RESOURCE:HAS[#ResourceName[LiquidFuel]]
		{
			@Ratio = 0.14274
		}

		@OUTPUT_RESOURCE:HAS[#ResourceName[Oxidizer]]
		{
			@Ratio = 0.17446
		}
	}
}

// Metal -> RocketParts
//
// KDs Metal -> RocketParts ratios were calculated using EPL Metal at
// 0.039 t/unit and RocketParts at 0.0025 t/unit:
//
//     0.039 / 0.0025 = 15.6
//
// This produces 15.6 RocketParts units for each Metal unit while preserving
// mass under EPLs resource densities.
//
// SimpleConstruction uses a 1:1 Metal -> RocketParts unit ratio. Multiplying
// the existing Metal input by 15.6 makes the input and output unit rates
// equal without changing each converters RocketParts production rate.
//
@PART[KD-3DPrinter-250,KD-3D-Printer,KD-FabricationContainer]:NEEDS[SimpleConstruction]:FOR[KeridianDynamics]
{
	@MODULE[ModuleResourceConverter]:HAS[@INPUT_RESOURCE:HAS[#ResourceName[Metal]],@OUTPUT_RESOURCE:HAS[#ResourceName[RocketParts]]]
	{
		@INPUT_RESOURCE:HAS[#ResourceName[Metal]]
		{
			@Ratio *= 15.6
		}
	}
}

// Pure Ore -> Metal furnaces
//
// KDs SimpleConstruction furnace balance targets a 70 mass-% Metal yield.
//
// The base large-furnace recipe consumes 8 Ore/s and produces
// 0.02051281923 Metal/s. That output represents a 1 mass-% yield when
// Metal has EPLs density of 0.039 t/unit.
//
// The previous SimpleConstruction adjustment multiplied the Metal output
// by 70, but did not account for SimpleConstruction reducing Metal density
// from 0.039 t/unit to 0.0078 t/unit.
//
//     Density correction = 0.039 / 0.0078 = 5
//     Yield correction   = 70
//     Combined multiplier = 70 * 5 = 350
//
// Large furnace:
//
//     Ore input       = 8 * 0.0100 = 0.080000 t/s
//     Metal output    = 0.02051281923 * 350 = 7.17948673 units/s
//     Metal mass      = 7.17948673 * 0.0078 = 0.056000 t/s
//     Metal mass yield = 0.056000 / 0.080000 = 70%
//
// The small furnace uses proportional input and output rates, so the same
// multiplier preserves the same 70 mass-% yield.
//
@PART[KD-Furnace,KD-FurnaceSmall]:NEEDS[SimpleConstruction]:FOR[KeridianDynamics]
{
	@MODULE[ModuleResourceConverter]:HAS[@INPUT_RESOURCE:HAS[#ResourceName[Ore]],@OUTPUT_RESOURCE:HAS[#ResourceName[Metal]]]
	{
		@OUTPUT_RESOURCE:HAS[#ResourceName[Metal]]
		{
			@Ratio *= 350
		}
	}
}

// KD supplies dedicated construction hardware. Remove the construction
// functionality that SimpleConstruction adds to ordinary docking ports.
// The wildcard deletes every copy, including duplicates left by installs
// containing both SimpleConstruction/Config and its legacy Patches directory.
@PART[*]:HAS[@MODULE[ModuleDockingNode]]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!MODULE[ELTarget],* {}
	!MODULE[ELWorkshop],* {}
	!MODULE[ELLaunchpad],* {}
	@description ^= :\\n<color=orange>SimpleConstruction!\.</color>::
	@description ^= : <color=orange>\\nSimpleConstruction Augmented\. </color>::
	@tags ^= :\s*cck-el cck-sc\s*: :
}

// The stock grappling device receives the same launchpad stack as docking
// ports, and should remain a grappling device when KD is installed.
@PART[*]:HAS[@MODULE[ModuleGrappleNode]]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!MODULE[ELTarget],* {}
	!MODULE[ELWorkshop],* {}
	!MODULE[ELLaunchpad],* {}
	@description ^= :\\n<color=orange>SimpleConstruction!\.</color>::
	@description ^= : <color=orange>\\nSimpleConstruction Augmented\. </color>::
	@tags ^= :\s*cck-el cck-sc\s*: :
}

// Remove SimpleConstructions workshop additions from stock command pods,
// crewed parts, and the three advanced stock probe cores. Property filters
// preserve purpose-built EL workshops supplied by KD or other part mods.
@PART[*]:HAS[@MODULE[ModuleCommand]:HAS[#minimumCrew[>0]]]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!MODULE[ELWorkshop]:HAS[#ProductivityFactor[0.5],#IgnoreCrewCapacity[False]] {}
	@tags ^= :\s*cck-el cck-sc\s*: :
}

@PART[*]:HAS[#CrewCapacity[>0],!MODULE[ModuleScienceLab]]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!MODULE[ELWorkshop]:HAS[#ProductivityFactor[4]] {}
	@tags ^= :\s*cck-el cck-sc\s*: :
}

@PART[probeStackSmall,mk2DroneCore,probeStackLarge]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!MODULE[ELWorkshop],* {}
	@description ^= :\\n<color=orange>SimpleConstruction!\.</color>::
	@tags ^= :\s*cck-el cck-sc\s*: :
}

// Science labs are not RocketParts printers or EL workshops when KD supplies
// the dedicated fabrication parts. Remove both current and legacy additions.
@PART[*]:HAS[@MODULE[ModuleScienceLab]]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!MODULE[ModuleResourceConverter]:HAS[@OUTPUT_RESOURCE:HAS[#ResourceName[RocketParts]]] {}
	!MODULE[ELWorkshop],* {}
	!RESOURCE[Metal],* {}
	!RESOURCE[RocketParts],* {}
	@description ^= :\\n<color=orange>SimpleConstruction!\.</color>::
	@description ^= : <color=orange>\\nSimpleConstruction Augmented\. </color>::
	@tags ^= :\s*cck-el cck-sc\s*: :
}

// Remove the Metal/Karbonite refinery converters added to ISRU and smelter
// parts. KDs furnaces and chemical reactor use their own part names and are
// therefore outside SimpleConstructions selector.
@PART[*ISRU*,Smelter*]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!MODULE[ModuleResourceConverter]:HAS[@OUTPUT_RESOURCE:HAS[#ResourceName[Metal]]] {}
	@description ^= :\\n<color=orange>SimpleConstruction!\.</color>::
	@description ^= : <color=orange>\\nSimpleConstruction Augmented\. </color>::
	@tags ^= :\s*cck-el cck-sc\s*: :
}

// SimpleConstruction also adds small local resource buffers to the stock
// drills and ISRU parts. The stock definitions contain no such storage.
@PART[RadialDrill,MiniDrill]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!RESOURCE[Ore],* {}
	@description ^= :\\n<color=orange>SimpleConstruction!\.</color>::
	@tags ^= :\s*cck-el cck-sc\s*: :
}

@PART[ISRU,MiniISRU]:NEEDS[Launchpad,SimpleConstruction]:AFTER[SimpleConstruction]
{
	!RESOURCE[MonoPropellant],* {}
	!RESOURCE[Metal],* {}
	!RESOURCE[Ore],* {}
	!RESOURCE[LiquidFuel],* {}
	!RESOURCE[Oxidizer],* {}
	!RESOURCE[Karbonite],* {}
}

// SimpleConstruction registers its own Community Category Kit tab. KD has
// dedicated construction parts and does not expose SimpleConstructions
// augmented-part category.
@CCKExtraFilterConfig:HAS[@Item:HAS[#tag[cck-sc]]]:NEEDS[CCK,SimpleConstruction]:FINAL
{
	!Item:HAS[#tag[cck-sc]] {}
}

// Kerbalism replaces ModuleScienceLab with Laboratory. SimpleConstruction
// patches those labs during its LAST pass, so remove that alternate path here.
@PART[*]:HAS[@MODULE[Laboratory]]:NEEDS[KerbalismDefault,Launchpad,SimpleConstruction]:FINAL
{
	!MODULE[ModuleResourceConverter]:HAS[@OUTPUT_RESOURCE:HAS[#ResourceName[RocketParts]]] {}
	!MODULE[ModuleSystemHeatConverter]:HAS[@OUTPUT_RESOURCE:HAS[#ResourceName[RocketParts]]] {}
	!MODULE[ELWorkshop],* {}
	!RESOURCE[Metal],* {}
	!RESOURCE[RocketParts],* {}
}

// Remove SimpleConstructions current and legacy augmentation labels from
// every part it touched, including compatibility patches for other part mods.
// Remove the SimpleConstruction category tag independently of tag ordering or
// duplicate tags; targeted patches above also remove cck-el where appropriate.
@PART[*]:NEEDS[Launchpad,SimpleConstruction]:FINAL
{
	@description ^= :\\n<color=orange>SimpleConstruction!\.</color>::
	@description ^= :\s*<color=orange>\\nSimpleConstruction Augmented\. </color>::
	@description ^= :\\n<color=#bada55> #BAE-B9-info</color>::
	@tags ^= :\s*cck-sc\s*: :
}

// SimpleConstruction replaces the stock Ore resource with its SCSwitch B9
// module. Restore the stock tanks and remove only SimpleConstructions switch.
@PART[RadialOreTank]:NEEDS[Launchpad,SimpleConstruction]:FINAL
{
	!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[SCSwitch]] {}
	!MODULE[ModuleB9PartInfo],* {}
	!MODULE[InterstellarFuelSwitch],* {}
	@title = #autoLOC_500670
	@description = #autoLOC_500671
	@tags = #autoLOC_500672
	%RESOURCE[Ore]
	{
		%amount = 0
		%maxAmount = 75
	}
}

@PART[SmallTank]:NEEDS[Launchpad,SimpleConstruction]:FINAL
