			{
				IDENTIFIER
				{
					name = ModuleConnectedLivingSpace
				}
				DATA
				{
					passable = False
				}
			}
		}

		+SUBTYPE[Dirt]
		{
			@name = Dirt-Cargo
			%title = Dirt / Cargo
