// KD-Rename.cfg
// Local presentation polish for Keridian Dynamics.
// String values live in a plain Localization node so KSP loads them before part localization.
// Part/module patches only assign localization keys.

Localization
{
	en-us
	{
		// Module strings.
		#KDVA-MRC-O2M-name = Ore to Metal
		#KDVA-MRC-O2M-strt = Start Ore to Metal
		#KDVA-MRC-O2M-stop = Stop Ore to Metal

		#KDVA-MRC-MO2M-name = Metal Ore to Metal
		#KDVA-MRC-MO2M-strt = Start Metal Ore to Metal
		#KDVA-MRC-MO2M-stop = Stop Metal Ore to Metal

		#KDVA-MRC-SM2M-name = ScrapMetal to Metal
		#KDVA-MRC-SM2M-strt = Start ScrapMetal to Metal
		#KDVA-MRC-SM2M-stop = Stop ScrapMetal to Metal

		#KDVA-MRC-M2RP-name = Metal to RocketParts
		#KDVA-MRC-M2RP-strt = Start Metal to RocketParts
		#KDVA-MRC-M2RP-stop = Stop Metal to RocketParts

		#KDVA-chemreactor-Ore2MetalLFO-name = Ore to Metal + LFO
		#KDVA-chemreactor-Ore2MetalLFO-strt = Start Ore to Metal + LFO
		#KDVA-chemreactor-Ore2MetalLFO-stop = Stop Ore to Metal + LFO

		#KDVA-chemreactor-MetalOre2MetalLFO-name = Metal Ore to Metal + LFO
		#KDVA-chemreactor-MetalOre2MetalLFO-strt = Start Metal Ore to Metal + LFO
		#KDVA-chemreactor-MetalOre2MetalLFO-stop = Stop Metal Ore to Metal + LFO

		#KDVA-chemreactor-moduleType = Chemical Reactor
		#KDVA-chemreactor-deploy = Start Chemical Reactor
		#KDVA-chemreactor-retract = Stop Chemical Reactor

		// Current parts.
		#KDVA-3DPrinter-titl = KD 3D Printer (2.5m)
		#KDVA-3DPrinter-desc = An automated manufacturing unit that prints RocketParts from Metal. It can operate without crew, though an engineer still improves throughput.

		#KDVA-chemreactor-titl = KD Chemical Reactor (2.5m)
		#KDVA-chemreactor-desc = A high-efficiency chemical processor for refining Metal from Ore or ScrapMetal. It operates slowly and consumes substantial power, but can recover useful secondary products from some recipes.

		#KDVA-furnace-small-titl = KD Small Furnace
		#KDVA-furnace-small-desc = A compact blast furnace for refining Metal from Ore, metal-bearing ore, or ScrapMetal. Faster and more power-efficient than the chemical reactor, but with lower recovery from recycled scrap.

		#KDVA-furnace-titl = KD Industrial Furnace
		#KDVA-furnace-desc = A heavy blast furnace for bulk Metal production from Ore, metal-bearing ore, or ScrapMetal. Designed for mature construction bases that need high refinery throughput.

		#KDVA-fabrication-container-titl = KD Fabrication Container
		#KDVA-fabrication-container-desc = A crewed fabrication workshop that converts Metal into RocketParts, MaterialKits, and SpecializedParts. Requires an engineer to operate and also contributes workshop productivity.

		#KDVA-FAVA-titl = KD Fully Automated Vessel Assembler
		#KDVA-FAVA-desc = An autonomous vessel-assembly workshop. Provides construction productivity without crew, but still requires a launch site or launch pad to spawn completed vessels.

		#KDVA-vab-mobile-titl = KD Mobile VAB
		#KDVA-vab-mobile-desc = A crewed mobile construction workshop for assembling vessels away from the KSC. Provides a very high workshop productivity factor. Completed vessels require a separate launch site or launch pad.

		#KDVA-orbital-hangar-titl = KD Orbital Assembly Hangar
		#KDVA-orbital-hangar-desc = A crewed orbital construction hangar with integrated vessel spawn points. Provides workshop productivity and can launch completed vessels directly from its VAB or SPH assembly positions.

		#KDVA-PAM-titl = KD Planetary Assembly Manager
		#KDVA-PAM-desc = A crewed assembly-management module for off-world construction sites. Provides survey-station capability and workshop productivity for bases using external launch sites or launch pads.

		#KDVA-PAM-small-titl = KD Planetary Assembly Manager (Short)
		#KDVA-PAM-small-desc = A compact crewed assembly-management module for small construction bases. Provides survey-station capability and limited workshop productivity.

		#KDVA-Keronica-titl = KD Keronica 1214 Command Computer
		#KDVA-Keronica-desc = A command computer for mining, refining, and industrial construction operations.

		#KDVA-LaunchPad-titl = KD Launch Pad
		#KDVA-LaunchPad-desc = A compact vessel spawn point for off-world construction. Provides a launch position only; workshop productivity must come from other KD assembly parts.

		#KDVA-LaunchPad-side-titl = KD Side-Mounted Launch Pad
		#KDVA-LaunchPad-side-desc = A side-mounted vessel spawn point for off-world construction. Provides a launch position only; workshop productivity must come from other KD assembly parts.

		#KDVA-LaunchPad-top-titl = KD Top-Mounted Launch Pad
		#KDVA-LaunchPad-top-desc = A top-mounted vessel spawn point for off-world construction. Provides a launch position only; workshop productivity must come from other KD assembly parts.

		#KDVA-LaunchSite-titl = KD Launch Site
		#KDVA-LaunchSite-desc = A portable launch site marker for off-world construction. Completed vessels can be spawned here after assembly by a compatible KD workshop or assembly module.

		#KDVA-pad-extension-titl = KD Extension Pad
		#KDVA-pad-extension-desc = A construction pad used to extend an existing vessel.

		#KDVA-pad-titl = KD Surface Assembly Pad
		#KDVA-pad-desc = A large surface launch pad for vessels assembled with Keridian Dynamics construction systems. Provides a launch position only; workshop productivity must come from other KD assembly parts.

		#KDVA-recycler-titl = KD Heavy Recycler
		#KDVA-recycler-desc = A large recycling unit for breaking down vessels and recovering ScrapMetal for further processing.

		#KDVA-recycler-small-titl = KD Small Recycler
		#KDVA-recycler-small-desc = A compact recycling unit for breaking down vessels and recovering ScrapMetal for further processing.

		#KDVA-recycle-site-titl = KD Recycle Site
		#KDVA-recycle-site-desc = A portable recycle-site marker. Attach it to the ground and connect it to storage to recover resources from recycled vessels.

		#KDVA-sledgehammer-titl = KD Sledgehammer "Susie"
		#KDVA-sledgehammer-desc = A construction tool used to attach portable KD launch-site and recycle-site markers to the ground.

		// Deprecated aliases.
		#KDVA-deprecated-3DPrinter-titl = KD 3D Printer (Deprecated)
		#KDVA-deprecated-3DPrinter-desc = Deprecated legacy part. Use the KD 3D Printer (2.5m) instead.
		#KDVA-deprecated-chemreactor-titl = KD Chemical Reactor (Deprecated)
		#KDVA-deprecated-chemreactor-desc = Deprecated legacy part. Use the KD Chemical Reactor (2.5m) instead.

		// Passable storage tanks.
		#KDVA-ST1001FS-titl = KD 1.25m Storage Adapter
		#KDVA-ST1001FS-desc = A compact 1.25m storage adapter for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST1251FS-titl = KD 1.25m Storage Module (Short)
		#KDVA-ST1251FS-desc = A short 1.25m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST1252FS-titl = KD 1.25m Storage Module (Medium)
		#KDVA-ST1252FS-desc = A medium 1.25m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST1253FS-titl = KD 1.25m Storage Module (Long)
		#KDVA-ST1253FS-desc = A long 1.25m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST2001FS-titl = KD 2.5m to 1.25m Storage Adapter (Straight)
		#KDVA-ST2001FS-desc = A straight 2.5m to 1.25m storage adapter for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST2002FS-titl = KD 2.5m to 1.25m Storage Adapter (Round)
		#KDVA-ST2002FS-desc = A rounded 2.5m to 1.25m storage adapter for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST2501FS-titl = KD 2.5m Storage Module (Short)
		#KDVA-ST2501FS-desc = A short 2.5m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST2502FS-titl = KD 2.5m Storage Module (Medium)
		#KDVA-ST2502FS-desc = A medium 2.5m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST2503FS-titl = KD 2.5m Storage Module (Long)
		#KDVA-ST2503FS-desc = A long 2.5m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST3001FS-titl = KD 3.75m to 1.25m Storage Adapter (Straight)
		#KDVA-ST3001FS-desc = A straight 3.75m to 1.25m storage adapter for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST3002FS-titl = KD 3.75m to 1.25m Storage Adapter (Round)
		#KDVA-ST3002FS-desc = A rounded 3.75m to 1.25m storage adapter for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST3251FS-titl = KD 3.75m to 2.5m Storage Adapter (Straight)
		#KDVA-ST3251FS-desc = A straight 3.75m to 2.5m storage adapter for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST3252FS-titl = KD 3.75m to 2.5m Storage Adapter (Round)
		#KDVA-ST3252FS-desc = A rounded 3.75m to 2.5m storage adapter for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST3751FS-titl = KD 3.75m Storage Module (Short)
		#KDVA-ST3751FS-desc = A short 3.75m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST3752FS-titl = KD 3.75m Storage Module (Medium)
		#KDVA-ST3752FS-desc = A medium 3.75m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		#KDVA-ST3753FS-titl = KD 3.75m Storage Module (Long)
		#KDVA-ST3753FS-desc = A long 3.75m storage module for station and base logistics. Supports configurable storage for construction and industrial resources.

		// Hidden legacy non-passable storage tanks.
		#KDVA-T1251FS-titl = KD Legacy 1.25m Storage Tank (Short)
		#KDVA-T1251FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 1.25m Storage Module family.

		#KDVA-T1252FS-titl = KD Legacy 1.25m Storage Tank (Medium)
		#KDVA-T1252FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 1.25m Storage Module family.

		#KDVA-T1253FS-titl = KD Legacy 1.25m Storage Tank (Long)
		#KDVA-T1253FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 1.25m Storage Module family.

		#KDVA-T2001FS-titl = KD Legacy 2.5m to 1.25m Storage Adapter
		#KDVA-T2001FS-desc = Hidden legacy non-passable storage adapter. Functionality has been rolled into the KD storage adapter family.

		#KDVA-T2501FS-titl = KD Legacy 2.5m Storage Tank (Short)
		#KDVA-T2501FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 2.5m Storage Module family.

		#KDVA-T2502FS-titl = KD Legacy 2.5m Storage Tank (Medium)
		#KDVA-T2502FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 2.5m Storage Module family.

		#KDVA-T2503FS-titl = KD Legacy 2.5m Storage Tank (Long)
		#KDVA-T2503FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 2.5m Storage Module family.

		#KDVA-T3251FS-titl = KD Legacy 3.75m to 2.5m Storage Adapter
		#KDVA-T3251FS-desc = Hidden legacy non-passable storage adapter. Functionality has been rolled into the KD storage adapter family.

		#KDVA-T3751FS-titl = KD Legacy 3.75m Storage Tank (Short)
		#KDVA-T3751FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 3.75m Storage Module family.

		#KDVA-T3752FS-titl = KD Legacy 3.75m Storage Tank (Medium)
		#KDVA-T3752FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 3.75m Storage Module family.

		#KDVA-T3753FS-titl = KD Legacy 3.75m Storage Tank (Long)
		#KDVA-T3753FS-desc = Hidden legacy non-passable storage tank. Functionality has been rolled into the KD 3.75m Storage Module family.
	}
}

@PART[KD-3D-Printer|KD-3DPrinter]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@title = #KDVA-deprecated-3DPrinter-titl
	@description = #KDVA-deprecated-3DPrinter-desc
}

@PART[KD-ChemicalReactor]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@title = #KDVA-deprecated-chemreactor-titl
	@description = #KDVA-deprecated-chemreactor-desc
}

@PART[*]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[Ore-->Metal]]]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[Ore-->Metal]]
	{
		@ConverterName = #KDVA-MRC-O2M-name
		@StartActionName = #KDVA-MRC-O2M-strt
		@StopActionName = #KDVA-MRC-O2M-stop
	}
}

@PART[*]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[MetalOre-->Metal]]]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[MetalOre-->Metal]]
	{
		@ConverterName = #KDVA-MRC-MO2M-name
		@StartActionName = #KDVA-MRC-MO2M-strt
		@StopActionName = #KDVA-MRC-MO2M-stop
	}
}

@PART[*]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[ScrapMetal-->Metal]]]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[ScrapMetal-->Metal]]
	{
		@ConverterName = #KDVA-MRC-SM2M-name
		@StartActionName = #KDVA-MRC-SM2M-strt
		@StopActionName = #KDVA-MRC-SM2M-stop
	}
}

@PART[*]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[Metal-->RocketParts]]]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[Metal-->RocketParts]]
	{
		@ConverterName = #KDVA-MRC-M2RP-name
		@StartActionName = #KDVA-MRC-M2RP-strt
		@StopActionName = #KDVA-MRC-M2RP-stop
	}
}

@PART[*]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[Ore-->Metal+LFO]]]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[Ore-->Metal+LFO]]
	{
		@ConverterName = #KDVA-chemreactor-Ore2MetalLFO-name
		@StartActionName = #KDVA-chemreactor-Ore2MetalLFO-strt
		@StopActionName = #KDVA-chemreactor-Ore2MetalLFO-stop
	}
}

@PART[*]:HAS[@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[MetalOre-->Metal+LFO]]]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@MODULE[ModuleSystemHeatConverter]:HAS[#ConverterName[MetalOre-->Metal+LFO]]
	{
		@ConverterName = #KDVA-chemreactor-MetalOre2MetalLFO-name
		@StartActionName = #KDVA-chemreactor-MetalOre2MetalLFO-strt
		@StopActionName = #KDVA-chemreactor-MetalOre2MetalLFO-stop
	}
}

@PART[KD-ChemicalReactor*]:HAS[@MODULE[ModuleAnimationGroup]]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	@MODULE[ModuleAnimationGroup]
	{
		@deployActionName = #KDVA-chemreactor-deploy
		@retractActionName = #KDVA-chemreactor-retract
		@moduleType = #KDVA-chemreactor-moduleType
	}
}
