//
// Keridian Dynamics ST/T duplicate tank consolidation.
//
// ST parts remain editor-facing. T parts are hidden when B9PartSwitch can
// represent the blocked cargo variant on the matching ST part.
//
// Switches stay separate:
// - fuelSwitch: resource type
// - KDVA_passabilitySwitch: FreeIVA passable/blocked state and capacity delta
// - ModulePartVariants: stock crew/cargo whole-model skin and bottom style

