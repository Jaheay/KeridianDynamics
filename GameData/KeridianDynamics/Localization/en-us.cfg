		#KDVA-LaunchSite-titl = KD Launch Site
		#KDVA-LaunchSite-desc = A portable field marker for preparing off-world launch sites.
		
		#KDVA-fabrication-container-titl = KD Fabrication Container
		#KDVA-fabrication-container-desc = A crewed fabrication workshop that converts Metal into RocketParts, MaterialKits, and SpecializedParts. Requires an engineer and contributes to construction output.

		#KDVA-vab-mobile-titl = KD Mobile VAB
		#KDVA-vab-mobile-desc = A crewed mobile construction workshop for assembling vessels away from the KSC. Designed as the main production office for serious field construction crews.
		
		#KDVA-orbital-hangar-titl = KD Orbital Assembly Hangar
		#KDVA-orbital-hangar-desc = A crewed orbital construction hangar with integrated VAB and SPH assembly berths. Built for constructing and releasing vessels directly in orbit.

			#KDVA-orbital-hangar-variants-Free = No Side Node
