// Stock inventory fallback for KD's portable launch site.
//
// KeridianDynamics/Compatibility/KerbalInventorySystem.cfg hides KD-LaunchSite
// when KIS is absent. Stock ModuleGroundPart covers the same placement role.

@PART[KD-LaunchSite]:NEEDS[KeridianDynamics,!KIS]:AFTER[KeridianDynamics]
{
	@TechRequired = electronics
	@category = Utility
	%entryCost = 15000
	%TechHidden = False

	MODULE
	{
		name = ModuleGroundPart
		fxGroupDeploy = deploy
		placementAllowXRotation = true
		placementAllowYRotation = true
		placementAllowZRotation = true
		inventoryTooltip = ""
		packedVolume = 1
		kinematicDelay = 3
		placementMaxRivotVelocity = 0.003
		reinitResourcesOnStoreInVessel = false
		stackableQuantity = 10
	}

	MODULE
	{
		name = ModuleCargoPart
		packedVolume = 1
		stackableQuantity = 10
	}
}
