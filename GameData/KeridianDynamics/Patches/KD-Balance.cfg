// -----------------------------------------------------------------------------
// Keridian Dynamics balance tweaks.
// -----------------------------------------------------------------------------
// Cost model:
// - EL launch capability is priced as a strategic construction breakpoint, not
//   as ordinary station hardware.
// - Compact EL launch fixtures share one price because they expose equivalent
//   launch capability; mount orientation is not priced separately.
// - KD-Pad is the heavy surface-pad anchor.
// - KD-MobileVAB is the workshop-productivity anchor:
//     60000 funds / ProductivityFactor 5 = 12000 funds per PF.
// - KD-OrbitalHangar is priced as:
//     KD-Pad + 70% KD-MobileVAB productivity = 50000 + 42000.
// - Storage containers are intentionally not included in this pass; KD storage
//   masses and costs are already close enough to SSPX CRG logistics parts.
//
// Mass model:
// - Storage, furnaces, recyclers, Keronica, FAVA, MobileVAB, and heavy industrial
//   modules retain existing mass unless their physical scale is clearly below
//   comparable crewed/workshop hardware.
// - Mass changes are limited to compact crewed workshop/control parts and the
//   ExtensionPad, where existing values understate installed construction
//   hardware mass.

@PART[KD-LaunchPadTop|KD-LaunchPadSide|KD-LaunchPad]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Compact EL launch fixtures; priced below heavy surface pads and above portable site markers.
	@cost = 15000
}

@PART[KD-LaunchSite]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Portable EL site marker; priced below physical launch fixtures.
	@cost = 2000
}

@PART[KD-Pad]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Heavy surface launch/assembly pad; used as the pad-cost anchor.
	@cost = 50000
}

@PART[KD-ExtensionPad]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Station and yard expansion interface. Priced below a full heavy pad, but
	// above compact fixtures because it enables in-place station growth.
	@cost = 40000

	// Existing 0.1 t mass is low for installed construction interface hardware.
	@mass = 0.5
}

@PART[KD-Keronica]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Integrated command, guidance, and EL launch capability.
	@cost = 52000
}

@PART[KD-MobileVAB]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Workshop-productivity anchor: ELWorkshop PF 5 plus survey capability.
	@cost = 60000

	// Crew capacity reduced to match the parts size.
	@CrewCapacity = 4
}

@PART[KD-OrbitalHangar]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Heavy pad anchor plus 70% of MobileVAB productivity:
	// 50000 + (60000 * 0.7) = 92000.
	@cost = 92000
}

@PART[KD-PAMSmall]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Compact one-crew survey/workshop module, PF 1.
	@cost = 14000

	// Raised above small crew-can mass to account for survey/workshop hardware.
	@mass = 1.25
}

@PART[KD-PAM]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Two-crew survey/workshop module, PF 1.5.
	@cost = 21000

	// Raised modestly for larger crewed control volume and workshop equipment.
	@mass = 2.0
}

@PART[KD-FabricationContainer]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// PF 2 workshop with construction-resource fabrication.
	@cost = 28000

	// Existing mass is too close to a plain one-crew pod for a workshop/converter.
	@mass = 2.5
}

@PART[KD-FAVA]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Autonomous workshop; existing premium cost is retained.
	@cost = 96000
}

@PART[KD-3DPrinter-250]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Automated final-stage RocketParts production.
	@cost = 22000
}

@PART[KD-ChemicalReactor-250]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Multi-input chemical processor with enhanced ScrapMetal recovery.
	@cost = 28000
}

@PART[KD-FurnaceSmall]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Compact metal-chain refinery.
	@cost = 14000
}

@PART[KD-Furnace]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Bulk metal-chain refinery; priced as major industrial equipment.
	@cost = 45000
}

@PART[KD-RecyclerSmall]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Compact EL recycling machinery.
	@cost = 18000
}

@PART[KD-Recycler]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Heavy EL recycling machinery.
	@cost = 45000
}

@PART[KD-RecycleSite]:NEEDS[KeridianDynamics]:AFTER[KeridianDynamics]
{
	// Portable EL recycle-site marker.
	@cost = 1000
}
